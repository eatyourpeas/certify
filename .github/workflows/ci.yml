name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project dependencies and test runner
          pip install reportlab pillow python-docx pytest
          # Install the package so tests can import project modules
          pip install -e .
      - name: Run tests
        run: |
          python -m pip install pytest
          pytest -q
